<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>비비드브레인 훈련 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap');

  :root {
    --teal:#007B7B;
    --teal-bright:#2ABFBF;
    --teal-dk:#005F5F;
    --teal-lt:#E0F7F7;
    --bg:#F0F6F6;
    --card:#FFFFFF;
    --txt:#111D2A;
    --txt2:#4A5968;
    --txt3:#7A8A9A;
    --danger:#D94545;
    --border:#D8E2E8;
    --r:20px;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  html,body{
    height:100%;overflow:hidden;
    font-family:'Noto Sans KR',-apple-system,sans-serif;
    background:var(--bg);color:var(--txt);
    -webkit-text-size-adjust:100%;
  }

  .app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:600px;margin:0 auto;position:relative;}
  @supports(height:100dvh){.app{height:100dvh;}}

  

  /* ═══ HEADER ═══ */
  .hdr{
    background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dk) 100%);
    padding:max(env(safe-area-inset-top,10px),10px) 18px 12px;
    flex-shrink:0;position:relative;overflow:hidden;
  }
  .hdr::after{
    content:'';position:absolute;top:-60%;right:-25%;width:180px;height:180px;
    background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);border-radius:50%;
  }
  .hdr-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
  .hdr-logo{height:22px;filter:brightness(0) invert(1);opacity:0.95;}
  .hdr-status{
    display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;
    font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,0.18);
    backdrop-filter:blur(4px);transition:all 0.3s;
  }
  .hdr-status.listening{background:rgba(217,69,69,0.5);}
  .hdr-status.speaking{background:rgba(255,255,255,0.3);}
  .hdr-dot{width:7px;height:7px;border-radius:50%;background:#fff;transition:background 0.3s;}
  .hdr-status.listening .hdr-dot{background:#FF9B9B;animation:blink 0.8s infinite;}
  .hdr-status.speaking .hdr-dot{background:#90FFD5;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

  /* ═══ WEEK BAR — BIG for elderly ═══ */
  .week-bar{
    flex-shrink:0;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);
    display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .week-bar::-webkit-scrollbar{display:none;}
  .wk{
    min-width:52px;height:46px;border-radius:12px;background:var(--teal-lt);border:2.5px solid transparent;
    font-size:15px;font-weight:700;font-family:inherit;color:var(--teal-dk);cursor:pointer;
    transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .wk:active{transform:scale(0.95);}
  .wk.on{
    background:var(--teal);color:#fff;border-color:var(--teal-dk);
    box-shadow:0 3px 10px rgba(0,123,123,0.35);
  }

  /* ═══ CHAT ═══ */
  .chat{
    flex:1;overflow-y:auto;padding:14px 12px 8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
  }
  .chat::-webkit-scrollbar{width:3px;}
  .chat::-webkit-scrollbar-thumb{background:#D0DDE5;border-radius:3px;}

  .m{margin-bottom:14px;display:flex;gap:8px;animation:mIn 0.3s ease-out;}
  @keyframes mIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .m-bot{align-items:flex-start;}
  .m-user{flex-direction:row-reverse;}
  .m-av{
    width:32px;height:32px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;font-size:15px;flex-shrink:0;
  }
  .m-bot .m-av{background:var(--teal-lt);}
  .m-user .m-av{background:#FFF3E8;}
  .m-bub{max-width:82%;padding:12px 16px;border-radius:16px;font-size:16px;line-height:1.75;word-break:keep-all;}
  .m-bot .m-bub{background:#EEF3F5;color:var(--txt);border-bottom-left-radius:4px;}
  .m-user .m-bub{background:var(--teal);color:#fff;border-bottom-right-radius:4px;}
  .m-time{font-size:11px;color:var(--txt3);margin-top:3px;padding:0 4px;}
  .m-user .m-time{text-align:right;}

  /* ─ Speaking wave ─ */
  .wave-wrap{
    display:none;align-items:center;gap:8px;padding:8px 14px;margin-bottom:10px;
    background:var(--teal-lt);border-radius:14px;font-size:13px;color:var(--teal-dk);font-weight:500;
  }
  .wave-wrap.on{display:inline-flex;}
  .wave{display:flex;gap:2px;align-items:center;height:18px;}
  .wave i{width:3px;background:var(--teal);border-radius:2px;animation:w 0.7s ease-in-out infinite;}
  .wave i:nth-child(1){height:7px;animation-delay:0s}
  .wave i:nth-child(2){height:13px;animation-delay:.12s}
  .wave i:nth-child(3){height:9px;animation-delay:.24s}
  .wave i:nth-child(4){height:15px;animation-delay:.08s}
  .wave i:nth-child(5){height:11px;animation-delay:.2s}
  @keyframes w{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}

  /* ═══ QUICK BUTTONS — BIG ═══ */
  .qbar{
    flex-shrink:0;padding:8px 12px;background:var(--card);border-top:1px solid var(--border);
    display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .qbar::-webkit-scrollbar{display:none;}
  .qb{
    white-space:nowrap;padding:11px 16px;border-radius:24px;border:2px solid var(--border);
    background:#fff;font-size:15px;font-weight:600;font-family:inherit;color:var(--txt2);
    cursor:pointer;transition:all 0.2s;flex-shrink:0;
  }
  .qb:active{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);}

  /* ═══ BOTTOM ═══ */
  .bottom{
    flex-shrink:0;background:var(--card);border-top:1px solid var(--border);
    padding:8px 16px 4px;
  }
  .ctrl-row{display:flex;align-items:center;gap:12px;justify-content:center;}
  .big-mic{
    width:68px;height:68px;border-radius:50%;border:none;background:var(--teal);color:#fff;
    font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all 0.25s;box-shadow:0 4px 16px rgba(0,123,123,0.3);
  }
  .big-mic:active{transform:scale(0.94);}
  .big-mic.recording{background:var(--danger);box-shadow:0 4px 20px rgba(217,69,69,0.4);animation:pulse 1.4s infinite;}
  .big-mic.paused{background:var(--txt3);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,69,69,0.35)}50%{box-shadow:0 0 0 16px rgba(217,69,69,0)}}

  .ctrl-label{font-size:13px;color:var(--txt3);text-align:center;margin-top:4px;font-weight:500;}
  .ctrl-label .key{color:var(--teal);font-weight:700;}

  .mode-toggle{
    padding:10px 18px;border-radius:24px;border:2px solid var(--border);background:#fff;
    font-size:14px;font-weight:600;font-family:inherit;color:var(--txt2);cursor:pointer;transition:all 0.2s;
  }
  .mode-toggle:active{background:var(--teal-lt);border-color:var(--teal);color:var(--teal);}

  .text-row{display:none;gap:8px;align-items:center;}
  .text-row.on{display:flex;}
  .voice-row.off{display:none;}

  .tinput{
    flex:1;border:2px solid var(--border);border-radius:24px;padding:12px 18px;
    font-size:16px;font-family:inherit;color:var(--txt);outline:none;transition:border-color 0.2s;
  }
  .tinput:focus{border-color:var(--teal);}
  .tinput::placeholder{color:var(--txt3);}
  .send-btn{
    width:48px;height:48px;border-radius:50%;border:none;background:var(--teal);color:#fff;
    font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  }

  /* ═══ FOOTER — customer center ═══ */
  .footer{
    flex-shrink:0;background:#F5F8F8;border-top:1px solid var(--border);
    padding:6px 16px;padding-bottom:max(6px, env(safe-area-inset-bottom,6px));
    text-align:center;
  }
  .footer a{
    color:var(--teal);font-size:14px;font-weight:600;text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;
  }
  .footer .sep{color:var(--txt3);font-size:12px;margin:0 4px;}
  .footer .ft-label{color:var(--txt3);font-size:12px;}

  .toast{
    position:fixed;top:max(env(safe-area-inset-top,8px),8px);left:50%;
    transform:translateX(-50%) translateY(-80px);background:rgba(17,29,42,0.92);color:#fff;
    padding:10px 22px;border-radius:12px;font-size:14px;font-weight:500;z-index:1000;
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);
  }
  .toast.show{transform:translateX(-50%) translateY(12px);}

  .listen-hint{
    position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
    background:rgba(217,69,69,0.9);color:#fff;padding:10px 24px;border-radius:22px;
    font-size:15px;font-weight:600;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:50;
  }
  .listen-hint.on{opacity:1;}
</style>
</head>

    hard:"어렵게 느껴지시는군요. 비비드브레인은요, 정답률 따라 난이도가 알아서 조절돼요. 틀려도 괜찮아요. 난이도가 올라가면 도형이 희미해지는데 자연스러운 거예요. 시선 고정하시고 빠르게 응답하시는 게 중요해요.",
    noEffect:"효과가 바로 안 느껴지실 수 있어요. 국내 12개 대학병원 임상시험에서 시야 개선 효과가 확인된 치료예요. 12주 훈련 끝나고 종합 평가에서 확인하실 수 있어요.",
    motivation:"의욕이 안 나시죠. 그래도 지금 하시는 훈련 하나하나가 시야 개선의 밑거름이에요. 매 훈련이 서버에 기록되고 담당 선생님도 보고 계세요.",
    tired:"피곤하시거나 스트레스가 있으실 때는요, 충분히 쉬신 후에 하시는 게 좋아요. 컨디션이 괜찮은 시간에 규칙적으로 하시는 게 중요해요.",
  },
  hospital:{
    visit:"병원 방문은요, 처음 시작할 때 한 번, 그리고 12주 훈련이 끝난 뒤에 한 번 가시면 돼요. 12주 후 방문 때 최종 평가를 진행해요.",
    doctor:"담당 선생님 관련 질문은요, 처방받으신 병원에 직접 문의하시는 게 가장 정확해요.",
    prescription:"비비드브레인은 의사 선생님의 처방을 받아야 사용할 수 있는 디지털 치료 기기예요. 처방 없이는 사용이 안 돼요.",
  },
  cs:"죄송해요, 이 부분은 제가 정확히 답변드리기 어려워요. 고객센터 1688-6854로 전화해 주시면 자세히 도와드릴 수 있어요. 평일 오전 9시부터 오후 6시까지 운영해요."
};

function startApp(){
  buildWeeks();loadVoices();initSTT();greet();
}

startApp();

function buildWeeks(){
  const bar=document.getElementById('weekBar');
  for(let i=1;i<=12;i++){
    const b=document.createElement('button');
    b.className='wk'+(i===1?' on':'');
    b.textContent=i+'주';
    b.onclick=()=>pickWeek(i);
    bar.appendChild(b);
  }
}

function pickWeek(w){
  week=w;
  document.querySelectorAll('.wk').forEach((d,i)=>d.classList.toggle('on',i+1===w));
  const t=KB.tips[w];addBot(t);speak(t);
}

function loadVoices(){
  const pick=()=>{
    const v=synth.getVoices();
    const ko=v.filter(x=>x.lang.startsWith('ko'));
    // 여성 음성 우선 (Female, 여, Yuna, Sunhi, Google 한국어 등)
    koVoice=ko.find(x=>/female|여|yuna|sunhi/i.test(x.name))
         ||ko.find(x=>/google/i.test(x.name))
         ||ko.find(x=>!x.localService)
         ||ko.find(x=>!/male|남/i.test(x.name))
         ||ko[0]
         ||null;
    if(koVoice)console.log('Voice:',koVoice.name);
  };
  pick();synth.onvoiceschanged=pick;
}

function speak(text){
  if(!synth)return;
  synth.cancel();
  const chunks=text.split(/(?<=[.!?。,，])\s*/).filter(s=>s.trim());
  isSpeaking=true;updateStatus('speaking');
  document.getElementById('waveWrap').classList.add('on');
  if(isListening){try{recognition.abort();}catch(e){}isListening=false;}

  let i=0;
  function next(){
    if(i>=chunks.length){
      isSpeaking=false;updateStatus(continuousMode?'listening':'idle');
      document.getElementById('waveWrap').classList.remove('on');updateMic();
      if(continuousMode){clearTimeout(restartTimer);restartTimer=setTimeout(()=>startListening(),500);}
      return;
    }
    const s=chunks[i].trim();
    if(!s){i++;next();return;}
    const u=new SpeechSynthesisUtterance(s);
    u.lang='ko-KR';u.rate=0.92;u.pitch=1.04;u.volume=1.0;
    if(koVoice)u.voice=koVoice;
    u.onend=()=>{i++;const pause=s.match(/[.!?。]$/)?300:140;setTimeout(next,pause);};
    u.onerror=()=>{isSpeaking=false;document.getElementById('waveWrap').classList.remove('on');updateStatus(continuousMode?'listening':'idle');updateMic();if(continuousMode)startListening();};
    synth.speak(u);
  }
  next();
}

function initSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();recognition.lang='ko-KR';recognition.interimResults=false;recognition.continuous=false;recognition.maxAlternatives=1;
  recognition.onresult=(e)=>{const txt=e.results[0][0].transcript;if(txt.trim()){addUser(txt);handle(txt);}};
  recognition.onerror=(e)=>{isListening=false;if(e.error==='no-speech'&&continuousMode&&!isSpeaking){clearTimeout(restartTimer);restartTimer=setTimeout(()=>startListening(),300);}updateMic();};
  recognition.onend=()=>{isListening=false;updateMic();if(continuousMode&&!isSpeaking){clearTimeout(restartTimer);restartTimer=setTimeout(()=>startListening(),300);}};
}

function startListening(){
  if(!recognition||isSpeaking||isListening)return;
  try{recognition.start();isListening=true;updateMic();updateStatus('listening');
    const h=document.getElementById('listenHint');h.classList.add('on');setTimeout(()=>h.classList.remove('on'),2500);
  }catch(e){}
}
function stopListening(){if(recognition&&isListening){try{recognition.abort();}catch(e){}}isListening=false;updateMic();}

function toggleContinuous(){
  if(continuousMode){stopAll();}
  else{continuousMode=true;updateMic();
    document.getElementById('ctrlLabel').innerHTML='<span class="key">연속 대화 중</span> — 말씀해 주세요';
    showToast('🎙️ 연속 대화 모드 시작');startListening();}
}
function stopAll(){
  continuousMode=false;clearTimeout(restartTimer);synth.cancel();stopListening();isSpeaking=false;
  document.getElementById('waveWrap').classList.remove('on');updateStatus('idle');updateMic();
  document.getElementById('ctrlLabel').innerHTML='버튼을 눌러 <span class="key">연속 대화</span>를 시작하세요';
}
function toggleMode(){
  voiceMode=!voiceMode;
  document.getElementById('voiceRow').classList.toggle('off',!voiceMode);
  document.getElementById('textRow').classList.toggle('on',!voiceMode);
  if(!voiceMode){stopAll();document.getElementById('tinput').focus();}
}
function sendTxt(){const inp=document.getElementById('tinput');const t=inp.value.trim();if(!t)return;inp.value='';addUser(t);handle(t);}

function updateMic(){
  const b=document.getElementById('bigMic');b.classList.remove('recording','paused');
  if(continuousMode&&isListening)b.classList.add('recording');
  else if(continuousMode&&isSpeaking)b.classList.add('paused');
}
function updateStatus(state){
  const el=document.getElementById('hdrStatus');const lbl=document.getElementById('hdrLabel');
  el.className='hdr-status';
  if(state==='listening'){el.classList.add('listening');lbl.textContent='듣는 중';}
  else if(state==='speaking'){el.classList.add('speaking');lbl.textContent='말하는 중';}
  else{lbl.textContent='대기 중';}
}

function addBot(text){
  const c=document.getElementById('chat');const d=document.createElement('div');d.className='m m-bot';
  d.innerHTML=`<div class="m-av">🧠</div><div><div class="m-bub">${text}</div><div class="m-time">${ts()}</div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function addUser(text){
  const c=document.getElementById('chat');const d=document.createElement('div');d.className='m m-user';
  d.innerHTML=`<div class="m-av">👤</div><div><div class="m-bub">${text}</div><div class="m-time">${ts()}</div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function ts(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function ask(t){addUser(t);handle(t);}

// ─── NLU ───
function handle(text){
  if(isListening)stopListening();
  const t=text.toLowerCase();let r='';

  // ── VR 기기 하드웨어 ──
  if(has(t,['충전','배터리','케이블','usb'])) r=KB.device.charge;
  else if(has(t,['까맣','까만','검은','검정','어두'])) r=KB.device.black;
  else if(has(t,['전원','켜','끄','안 켜','먹통','재시작','리셋'])){
    if(has(t,['안 켜','먹통','안돼','고장'])) r=KB.device.notWorking;
    else r=KB.device.power;
  }
  else if(has(t,['착용','쓰는 법','머리','끈','다이얼','헤드셋','장착'])) r=KB.device.wear;
  else if(has(t,['컨트롤러','리모컨','조종','트리거'])){
    if(has(t,['인식','안 돼','안돼','반응'])) r=KB.device.controllerNotWork;
    else r=KB.device.controller;
  }
  else if(has(t,['흐리','흐려','뿌옇','안 보여','선명','초점','렌즈','화면이 흐'])){
    if(has(t,['더럽','닦','청소','먼지'])) r=KB.device.clean;
    else r=KB.device.blur;
  }
  else if(has(t,['안경','시력','눈 나빠','근시','난시','원시'])) r=KB.device.glasses;
  else if(has(t,['닦','청소','위생','소독','보관'])) r=KB.device.clean;
  else if(has(t,['옆으로','이동','중앙','재조정'])) r=KB.device.screenMove;
  else if(has(t,['멈추','일시정지','잠깐','중간에','중단'])) r=KB.device.pause;
  else if(has(t,['고장','수리','작동'])) r=KB.device.notWorking;
  else if(has(t,['장애물','환경','안전한 곳'])) r=KB.device.environment;

  // ── 앱 사용법 ──
  else if(has(t,['로그인','핀번호','핀 번호','pin','비밀번호','비번'])){
    if(has(t,['잊','까먹','모르','재설정','초기화','틀리','초과'])) r=KB.app.pin;
    else r=KB.app.login;
  }
  else if(has(t,['회원가입','가입','카카오톡','문자 안내'])) r=KB.app.signup;
  else if(has(t,['로비','홈 화면','메인 화면','메뉴 화면'])) r=KB.app.lobby;
  else if(has(t,['결과','기록','결과표','성적','점수','레벨 기록'])) r=KB.app.result;
  else if(has(t,['소리','음성','안내','안 들려'])) r=KB.app.sound;
  else if(has(t,['업데이트','버전'])) r=KB.app.update;
  else if(has(t,['서버','통신'])) r=KB.app.serverError;
  else if(has(t,['홈페이지','웹사이트','사이트'])) r=KB.app.website;
  else if(has(t,['시작','치료 시작','어디서','어떻게 시작'])) r=KB.app.start;

  // ── WiFi ──
  else if(has(t,['와이파이','wifi','인터넷','연결','네트워크','공유기'])){
    if(has(t,['어떻게','방법','연결'])) r=KB.wifi.how;
    else if(has(t,['안 되','안돼','못','끊겨','오류','문제','느려'])) r=KB.wifi.trouble;
    else if(has(t,['왜','필요','꼭'])) r=KB.wifi.why;
    else if(has(t,['뭐','무엇','모양','생겼','생김','어디'])) r=KB.wifi.router;
    else r=KB.wifi.what+' '+KB.wifi.how;
  }

  // ── 훈련 방법 ──
  else if(has(t,['훈련 방법','어떻게 해','사용법','치료하','하는 법','하는 방법'])) r=KB.general.howToTrain;
  else if(has(t,['가로세로','회전 치료','종류','가로','세로','엄지','검지','줄무늬','가버'])) r=KB.general.trainingTypes;
  else if(has(t,['연습','연습하기','미리'])) r=KB.general.practice;
  else if(has(t,['시선','고정','십자','눈','돌리'])) r=KB.general.gaze;
  else if(has(t,['몇 번','몇번','몇 회','얼마나 자주','주 몇','하루 몇'])) r=KB.general.schedule;
  else if(has(t,['쉬어','휴식','쉬는','30분','자동 종료','자동종료'])) r=KB.general.rest;
  else if(has(t,['혼자','본인','다른 사람','가족','보호자','대신'])) r=KB.general.onlyMe;

  // ── 부작용 ──
  else if(has(t,['부작용','어지러','멀미','두통','눈부','피로','아프','불편','통증','건조','메스','구역'])) r=KB.side.common+' '+KB.side.action;
  else if(has(t,['경련','떨림','발작'])) r=KB.side.seizure;
  else if(has(t,['눈 피로','눈이 아프','눈 아파','눈 시리','눈물'])) r=KB.side.eye;

  // ── 훈련 어려움 ──
  else if(has(t,['어렵','힘들','못하겠','어려움','난이도'])) r=KB.diff.hard;
  else if(has(t,['효과','변화','나아지','좋아지','개선'])) r=KB.diff.noEffect;
  else if(has(t,['의욕','의지','하기 싫','포기','지겹','귀찮'])) r=KB.diff.motivation+' '+rEnc();
  else if(has(t,['피곤','지치','컨디션','무리'])) r=KB.diff.tired;

  // ── 일정/평가 ──
  else if(has(t,['주차','스케줄','일정','기간','몇 주'])) r=`지금 ${week}주차로 설정되어 있어요. `+KB.tips[week];
  else if(has(t,['평가','검사','험프리','시야검사'])) r=KB.general.evaluation;
  else if(has(t,['순응','출석','횟수','기록'])) r=KB.general.compliance;

  // ── 병원/의사 ──
  else if(has(t,['병원','방문','언제 가'])) r=KB.hospital.visit;
  else if(hasNot(t,['의사','선생님','담당의','주치의'],['주의사항','주의할'])) r=KB.hospital.doctor;
  else if(has(t,['처방','받으려면','시작하려면'])) r=KB.hospital.prescription;

  // ── 설정 ──
  else if(has(t,['설정','테마','내 정보','재평가'])) r=KB.general.settings;
  else if(has(t,['금기','못 쓰','사용 불가','뇌전증','파킨슨','반맹'])) r=KB.side.contra;

  // ── 일반 ──
  else if(has(t,['주의사항','주의할','조심','안전','위험'])) r=KB.general.gaze+' '+KB.side.common;
  else if(has(t,['비비드브레인','뭐','무엇','소개','제품','뉴냅스'])) r=KB.general.intro;
  else if(has(t,['안녕','반갑','하이','헬로'])) r=`안녕하세요! ${week}주차 훈련 도우미예요. 궁금한 거 물어봐 주세요.`;
  else if(has(t,['감사','고마워','고맙','땡큐'])) r='도움이 되셨다니 기뻐요! 다른 궁금한 거 있으시면 말씀해 주세요.';
  else if(has(t,['응원','힘내','격려','화이팅'])) r=rEnc();
  else if(has(t,['전화','고객센터','문의','상담','연락처'])) r='고객센터 전화번호는 1688-6854예요. 전화하시면 자세히 도와드릴 수 있어요.';
  else if(has(t,['훈련','치료'])) r=KB.general.howToTrain;
  // Fallback → 고객센터 안내
  else r=KB.cs;

  setTimeout(()=>{addBot(r);speak(r);},350);
}

function has(t,kw){return kw.some(k=>t.includes(k));}
// 복합 키워드: 두 키워드가 모두 있어야 매칭
function hasAll(t,kws){return kws.every(k=>t.includes(k));}
// 특정 단어가 포함되지 않아야 매칭 (오매칭 방지)
function hasNot(t,kw,exclude){return kw.some(k=>t.includes(k)) && !exclude.some(k=>t.includes(k));}
function rEnc(){return KB.enc[Math.floor(Math.random()*KB.enc.length)];}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function greet(){
  const g="안녕하세요! 비비드브레인 훈련 도우미예요. 12주 훈련 동안 궁금한 게 있으시면 편하게 물어봐 주세요. 아래 마이크 버튼을 누르시면, 음성으로 계속 대화하실 수 있어요.";
  addBot(g);
  setTimeout(()=>{
    if(synth.getVoices().length===0){synth.onvoiceschanged=()=>{loadVoices();speak(g);};}
    else speak(g);
  },600);
}
